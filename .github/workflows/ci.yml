# CI: テスト(Windows/Linux × Python 3.10/3.13) + wheel ビルド + extras 単独インストール検証
# gitignore対象の大容量素材・edge-tts・VOICEVOX が無い環境では依存テストが
# pytest.skip される(許可リスト外の想定外skipは検知して失敗させる)。
name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  # 日本語の進捗出力・マニフェストをロケール非依存で扱う
  PYTHONUTF8: "1"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: 改行規約の検証
        # .gitattributes(自前text=CRLF固定)に対しリポジトリが正規化済みであること。
        # 内容ハッシュ指紋がclone環境の改行差でずれない前提を守る(監査 issue #17)
        shell: bash
        run: git add --renormalize . && git diff --cached --stat --exit-code
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: FFmpeg を導入 (Windows)
        if: runner.os == 'Windows'
        uses: FedericoCarboni/setup-ffmpeg@v3
      - name: FFmpeg と日本語フォントを導入 (Linux)
        # apt の ffmpeg は 6.x で FFmpeg 8 の -/filter_complex 構文を知らず、
        # setup-ffmpeg の Linux 静的ビルドは drawtext(freetype) 非搭載。
        # BtbN の日付固定リリース(FFmpeg 8系, GPL, freetype入り)へ SHA-256 検証つきで固定する。
        # 更新するときは URL と SHA を明示的に PR で書き換えること(監査 issue #17)。
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          FF_URL="https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-07-20-14-10/ffmpeg-n8.1.2-29-g703dcc25b9-linux64-gpl-8.1.tar.xz"
          FF_SHA256="1beb1d21b4485962baeb2fff4f01e8b91faa6d1017567b07b8f26df1a93cbdfe"
          curl -fsSL -o /tmp/ffmpeg.tar.xz "$FF_URL"
          echo "$FF_SHA256  /tmp/ffmpeg.tar.xz" | sha256sum -c -
          mkdir -p /tmp/ffdist && tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffdist --strip-components=1
          sudo cp /tmp/ffdist/bin/ffmpeg /tmp/ffdist/bin/ffprobe /usr/local/bin/
      - name: FFmpeg のメジャーバージョンを検証 (8系必須)
        shell: bash
        run: |
          ffmpeg -version | head -1
          ffmpeg -version | head -1 | grep -Eq "ffmpeg version n?8\." \
            || { echo "FFmpeg 8 系ではありません"; exit 1; }
      - name: 依存をインストール
        run: python -m pip install -e .[all,dev]
      - name: Chromium を導入 (Linux)
        # formula() / web Object の実ブラウザ生成テストを実行するため
        if: runner.os == 'Linux'
        run: python -m playwright install --with-deps chromium
      - name: テスト実行(カバレッジ付き)
        run: python -m pytest tests/ -q -rs --cov=scriptvedit --cov-report=term --cov-fail-under=60 2>&1 | tee pytest.log
        shell: bash
      - name: 想定外の skip を検知
        # 許可された理由(gitignore対象の大容量素材・edge-tts・VOICEVOX・
        # Windows での Chromium/Pillow 未導入)以外の skip は失敗にする
        shell: bash
        run: |
          python - <<'EOF'
          import re, sys
          log = open("pytest.log", encoding="utf-8", errors="replace").read()
          allowed = [
              r"素材 .* が無い環境", r"ffmpeg", r"ffprobe", r"edge-tts",
              r"VOICEVOX", r"Chromium", r"chromium", r"Playwright",
              r"playwright", r"Pillow", r"scipy", r"numpy", r"フォント",
              r"再生成しました",
          ]
          bad = []
          for line in log.splitlines():
              m = re.match(r"SKIPPED \[\d+\] .*?: (.*)", line.strip())
              if m and not any(re.search(p, m.group(1)) for p in allowed):
                  bad.append(line.strip())
          if bad:
              print("想定外の skip:")
              print("\n".join(bad))
              sys.exit(1)
          print("skip はすべて許可リスト内")
          EOF

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: wheel をビルド
        run: |
          python -m pip install build
          python -m build
      - name: wheel のインストールと import スモーク
        run: |
          python -m pip install dist/*.whl
          python -c "import scriptvedit; print('import OK:', scriptvedit.MANIFEST_VERSION)"
          python -m scriptvedit describe --name fade > /dev/null
      - name: 各 extra の単独クリーンインストール検証
        # extra を1つだけ入れて対応モジュールが import できること(issue #13 P1-5 の回帰防止)
        run: |
          set -e
          WHEEL=$(ls dist/*.whl)
          declare -A MODS=( [morph]=scriptvedit.morph [beat]=scriptvedit.beat [tools]=scriptvedit.testkit [web]=scriptvedit.web [tts]=scriptvedit.tts )
          for ex in morph beat tools web tts; do
            python -m venv "/tmp/venv_$ex"
            "/tmp/venv_$ex/bin/pip" install --quiet "${WHEEL}[$ex]"
            "/tmp/venv_$ex/bin/python" -c "import importlib; importlib.import_module('${MODS[$ex]}'); print('$ex OK')"
          done
      - name: 成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<script src="vendor/katex/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: content-box; }
html, body { background: transparent; }
/* 数式コンテナ: 内容ぴったりの max-content 幅（要素スクリーンショットで余白トリム不要）。
   width:max-content にすることでビューポート幅より広い数式でも折り返さず正しく測れる。 */
#formula { display: inline-block; width: max-content; }
/* displayMode の .katex-display は margin:1em 0 / text-align:center を持つ。
   bboxを数式ぴったりにするため margin をゼロ化し、揃えは親の text-align に従わせる。 */
#formula .katex-display { margin: 0; text-align: inherit; }
</style></head>
<body>
<div id="formula"></div>
<script>
// Python 側（formula.py）から evaluate される。成功時 null、失敗時 {error, index} を返す。
function renderFormula(d) {
  var root = document.getElementById("formula");
  root.innerHTML = "";
  root.style.fontSize = d.size + "px";
  root.style.color = d.color;
  root.style.padding = d.padding + "px";
  root.style.textAlign = d.align || "left";
  var lines = d.lines || [];
  for (var i = 0; i < lines.length; i++) {
    var el = document.createElement("div");
    if (i > 0 && d.gap) { el.style.marginTop = d.gap + "px"; }
    try {
      katex.render(lines[i], el, {
        displayMode: !!d.display,
        throwOnError: true,
        output: "html"
      });
    } catch (e) {
      return {error: String((e && e.message) || e), index: i};
    }
    root.appendChild(el);
  }
  return null;
}
// 数式のbbox（padding込み）を返す
function formulaBox() {
  var r = document.getElementById("formula").getBoundingClientRect();
  return {w: r.width, h: r.height};
}
</script>
</body></html>

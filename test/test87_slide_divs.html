<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 640px; height: 360px; background: #181818; overflow: hidden;
       font-family: "Meiryo", sans-serif; color: white; }
.pg { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center; font-size: 48px; }
</style></head>
<body>
<!-- window.showSlideを定義しない: id="page-N" フォールバック規約の検証用 -->
<div class="pg" id="page-0" style="background:#603030;">DIV PAGE 0</div>
<div class="pg" id="page-1" style="background:#306030;">DIV PAGE 1</div>
</body></html>
